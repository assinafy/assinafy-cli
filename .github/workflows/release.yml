name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify bundle
        run: npm run verify:bundle

      - name: Verify installer syntax
        run: |
          bash -n install.sh
          pwsh -NoLogo -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw install.ps1))'

      - name: Package release assets
        run: npm run pack:release

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release tag
        run: |
          version="$(node -p "require('./package.json').version")"
          expected="v${version}"
          if [ "${{ steps.release-tag.outputs.tag }}" != "$expected" ]; then
            echo "Release tag must be ${expected}" >&2
            exit 1
          fi

      - name: Verify release checksums
        run: shasum -a 256 -c SHA256SUMS
        working-directory: dist/release

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release-tag.outputs.tag }}" dist/release/* --clobber

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      # Re-point the .npmrc at GitHub Packages and publish the same build there.
      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
          scope: '@assinafy'
          package-manager-cache: false

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public --registry=https://npm.pkg.github.com
